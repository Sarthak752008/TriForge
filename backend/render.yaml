services:
  - type: web
    name: triforge-backend
    env: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: FIREWORKS_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: ACTIVE_LOCAL_MODEL
        value: llama-3.1-8b-instant
      - key: ACTIVE_REMOTE_MODEL
        value: llama-3.3-70b-versatile
      - key: ENABLE_CACHE
        value: "true"
      - key: DEFAULT_CONSISTENCY_THRESHOLD
        value: "0.8"
      - key: PYTHON_VERSION
        value: "3.11.0"
